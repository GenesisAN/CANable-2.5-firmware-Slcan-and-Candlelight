name: Firmware Release

# Create GitHub Releases for version update notifications only.
# Release tags must use the basic v*.*.* format, for example v1.2.3.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

env:
  # GitHub is migrating JavaScript actions from Node.js 20 to Node.js 24.
  # Opt in now to avoid Node.js 20 deprecation warnings and catch compatibility issues early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Publish release notification
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          # Let GitHub create commit/PR release notes between this tag and the previous tag.
          generate_release_notes: true
          body: |
            Automated firmware release notification for `${{ github.ref_name }}`.

            Source commit: `${{ github.sha }}`

            This release is only used for version update checks and notifications.
            No firmware binaries or other build artifacts are attached.
